name: Form Handler

on:
  repository_dispatch:
    types: [form-submission]

jobs:
  add-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Add to Notion
        run: |
          curl -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d '{
              "parent": { "database_id": "${{ secrets.NOTION_DATABASE_ID }}" },
              "properties": {
                "Email": { "title": [{ "text": { "content": "${{ github.event.client_payload.email }}" } }] },
                "Name": { "rich_text": [{ "text": { "content": "${{ github.event.client_payload.name }}" } }] },
                "Source": { "select": { "name": "Alfred Landing Page" } },
                "Status": { "select": { "name": "New Lead" } },
                "Date": { "date": { "start": "'$(date -Iseconds)'" } }
              }
            }'
